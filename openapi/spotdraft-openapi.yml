    post:
      operationId: v2_public_contracts_create
      description: "Creates a new contract from a SpotDraft template and returns the created contract.\n\nProvide the template\
        \ id, contract data, and counterparty details needed to render the agreement. Use this endpoint when you want SpotDraft\
        \ to generate the contract from structured data.\n\nCreates a new contract from a SpotDraft template and returns the\
        \ created contract.\n\nProvide contract data, counterparty details, and any required signatories for the workflow.\n\
        \n\nIn signatories list, sign_order should be set for either all items or no items of the list. Additionally when\n\
        sign_order is set for all items of signatories list then at-least one counter party signatory user should also be\
        \ part\nof the list.\n\nThe `contract_data` object must use **template field names as keys**. Each value should match\
        \ the data type configured for that field in SpotDraft.\n\n| Field type | Expected value | Example |\n| ----------\
        \ | -------------- | ------- |\n| String / text | String | `\"Acme Inc.\"` |\n| Multi-line text | String with line\
        \ breaks if needed | `\"Not applicable\\nCustomer redlines pending\"` |\n| Number | Integer or decimal | `15` or `3.14`\
        \ |\n| Boolean / checkbox | Boolean | `true` |\n| Date | `YYYY-MM-DD` | `\"2026-03-28\"` |\n| Datetime | ISO 8601\
        \ timestamp | `\"2026-09-15T10:30:00Z\"` |\n| Dropdown | Selected option value | `\"annual_invoice\"` |\n| Multi-select\
        \ | Array of selected option values | `[\"US\", \"IN\"]` |\n| Currency | `{ \"type\": \"<ISO currency>\", \"value\"\
        : number }` | `{ \"type\": \"USD\", \"value\": 12000 }` |\n| Duration | `{ \"days\": int, \"type\": \"DAYS\\|MONTHS\\\
        |YEARS\", \"value\": int }` | `{ \"days\": 180, \"type\": \"MONTHS\", \"value\": 6 }` |\n| Address | Object with address\
        \ fields | `{ \"line_one\": \"350 Fifth Avenue\", \"city\": \"New York\", \"country\": \"United States\" }` |\n| Repeating\
        \ group | Array of row objects | `[{\"milestone\": \"Implementation\", \"amount\": {\"type\": \"USD\", \"value\":\
        \ 5000}}]` |\n| File / attachment | File object or uploaded file reference supported by the workflow | `{ \"file_name\"\
        : \"security-schedule.pdf\", \"content_type\": \"application/pdf\" }` |\n\nSample contract data:\n\n```json\n{\n \
        \ \"agreement_date\": \"2026-03-28\",\n  \"renewal_review_at\": \"2026-09-15T10:30:00Z\",\n  \"customer_name\": \"\
        Acme Inc.\",\n  \"billing_currency\": {\"type\": \"USD\", \"value\": 12000},\n  \"subscription_term\": {\"type\":\
        \ \"MONTHS\", \"value\": 12, \"days\": 365},\n  \"auto_renewal\": true,\n  \"notice_period_days\": 30,\n  \"service_countries\"\
        : [\"US\", \"IN\"],\n  \"billing_address\": {\n    \"line_one\": \"350 Fifth Avenue\",\n    \"city\": \"New York\"\
        ,\n    \"state\": \"NY\",\n    \"country\": \"United States\",\n    \"zipcode\": \"10118\"\n  },\n  \"pricing_schedule\"\
        : [\n    {\"milestone\": \"Implementation\", \"amount\": {\"type\": \"USD\", \"value\": 5000}},\n    {\"milestone\"\
        : \"Annual subscription\", \"amount\": {\"type\": \"USD\", \"value\": 7000}}\n  ],\n  \"msa_attachment\": {\"file_name\"\
        : \"security-schedule.pdf\", \"content_type\": \"application/pdf\"}\n}\n```\n"
      summary: Create Contract

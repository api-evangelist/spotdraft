        \ should have the following data types with the following output:\n<table>\n    <thead>\n    <tr>\n        <td>Type</td>\n\
        \        <td>Data Format</td>\n        <td>Sample</td>\n    </tr>\n    </thead>\n<tbody>\n    <tr>\n    <td>Duration</td>\n\
        \    <td>\n        <code>{\"days\": int, \"type\": DurationKind, \"value\": int}</code><br/>\n        `DurationKind`:\
        \ `DAYS` or `MONTHS` or `YEARS`\n    </td>\n    <td><code>{\"days\": 180, \"type\": \"MONTHS\", \"value\": 6}</code></td>\n\
        \    </tr>\n    <tr>\n    <td>Date</td>\n    <td>\n        String formatted date in form <code>YYYY-MM-dd</code>\n\
        \    </td>\n    <td><code>\"2019-11-29\"</code></td>\n    </tr>\n    <tr>\n    <td>Dropdown</td>\n    <td>\n     \
        \   Value as returned in <code>options</code>. Can be string or number.\n    </td>\n    <td><code>\"1\"</code></td>\n\
        \    </tr>\n    <tr>\n    <td>String</td>\n    <td>\n        A string value.\n    </td>\n    <td><code>\"Something\"\
        </code></td>\n    </tr>\n    <tr>\n    <td>Currency</td>\n    <td>\n        <code>{\"type\": CurrencyCode, \"value\"\
        : float}</code><br/>\n        Where currencyCode: \"INR\", \"USD\", \"SGD\", \"EUR\"\n    </td>\n    <td><code>{\"\
        type\": \"INR\", \"value\": 15000.00}</code></td>\n    </tr>\n    <tr>\n    <td>Check-box</td>\n    <td>\n       \
        \ A boolean value\n    </td>\n    <td><code>true</code></td>\n    </tr>\n    <tr>\n    <td>text-box</td>\n    <td>\n\
        \        A string value. Can be multi-line\n    </td>\n    <td><code>\"Not Applicable\\nBecause...\"</code></td>\n\
        \    </tr>\n    <tr>\n    <td>number</td>\n    <td>\n        A numeric value. Can be int or float\n    </td>\n   \
        \ <td><code>4</code> or <code>3.14</code></td>\n    </tr>\n</tbody>\n</table>\n\n\n### Sample Intake Form Data:\n\
        ```\n{\n    \"term\": {\"days\": 180, \"type\": \"MONTHS\", \"value\": 6},\n    \"notes\": \"Not Applicable\",\n \
        \   \"capacity\": 15,\n    \"setup_fee\": {\"type\": \"INR\", \"value\": 30000.00},\n    \"start_date\": \"2019-11-29\"\
        ,\n    \"yes_discounts\": false,\n    \"payment_method\": \"1\",\n    \"suggestions\": \"No suggestions\"\n}\n```\n"

    \ | `STRING` | Yes | Status during this interval |\n| `started_at` | `TIMESTAMP` | Yes | Start of this time interval |\n\
    | `ended_at` | `TIMESTAMP` | Yes | End of this interval (historical) |\n| `ended_at_current` | `TIMESTAMP` | Yes | End\
    \ of interval (current; may be ongoing) |\n| `time_spent_seconds` | `INT64` | Yes | Time spent in this state, in seconds\
    \ |\n| `party_type` | `STRING` | Yes | Internal or External party |\n| `review_filter` | `STRING` | Yes | Review stage\
    \ filter flag |\n| `approval_filter` | `STRING` | Yes | Approval stage filter flag |\n| `sign_filter` | `STRING` | Yes\
    \ | Sign stage filter flag |\n\n---\n\n## `contract_level_metrics_lc`\n\n<a id=\"table-contract_level_metrics_lc\"></a>\n\
    \nLifecycle-focused variant of contract_level_metrics — same structure without review_filter, approval_filter, sign_filter.\
    \ time_spent_seconds in seconds.\n\n### Schema\n\n| Column | Type | Nullable | Description |\n| --- | --- | --- | ---\
    \ |\n| `contract_id` | `INT64` | Yes | FK to lifecycle table |\n| `workspace_id` | `INT64` | Yes | Workspace filter (maps\
    \ from created_by_workspace_id) |\n| `event_id` | `STRING` | Yes | Unique event instance ID |\n| `event_sequence` | `STRING`\
    \ | Yes | Sequence ordering of events |\n| `event_category` | `STRING` | Yes | High-level event type |\n| `event_subcategory_1`\
    \ | `STRING` | Yes | Event sub-category level 1 |\n| `event_subcategory_2` | `STRING` | Yes | Event sub-category level\
    \ 2 |\n| `status` | `STRING` | Yes | Status during this interval |\n| `started_at` | `TIMESTAMP` | Yes | Start of interval\
    \ |\n| `ended_at` | `TIMESTAMP` | Yes | End of interval (historical) |\n| `ended_at_current` | `TIMESTAMP` | Yes | End\
    \ of interval (current) |\n| `time_spent_seconds` | `INT64` | Yes | Time in state, in seconds |\n| `party_type` | `STRING`\
    \ | Yes | Internal or External |\n\n---\n\n## `legal_intake`\n\n<a id=\"table-legal_intake\"></a>\n\nLegal intake requests\
    \ — one row per intake item. Legal ops workload and intake SLA.\n\n### Schema\n\n| Column | Type | Nullable | Description\
    \ |\n| --- | --- | --- | --- |\n| `intake_id` | `INT64` | Yes | Unique intake item ID |\n| `workspace_id` | `INT64` |\
    \ Yes | Workspace filter key |\n| `title` | `STRING` | Yes | Intake request title |\n| `created_at` | `TIMESTAMP` | Yes\
    \ | When intake was created |\n| `status` | `STRING` | Yes | Current status |\n| `priority` | `STRING` | Yes | Priority\
    \ level |\n| `due_date` | `DATE` | Yes | Target completion date |\n| `completed_at` | `TIMESTAMP` | Yes | When marked\
    \ complete |\n| `requested_by` | `STRING` | Yes | Who submitted the intake |\n| `assignee` | `STRING` | Yes | Who is responsible\
    \ |\n| `workflow_name` | `STRING` | Yes | Associated workflow, if any |\n| `linked_entity_type` | `STRING` | Yes | Type\
    \ of linked entity (e.g. contract) |\n| `linked_entity_id` | `STRING` | Yes | ID of the linked entity |\n| `pending_with`\
    \ | `STRING` | Yes | Who the intake is pending with |\n| `completion_time_days` | `FLOAT64` | Yes | Days taken to complete\
    \ |\n| `completion_time_hours` | `FLOAT64` | Yes | Hours taken to complete |\n| `pending_since_hours` | `FLOAT64` | Yes\
    \ | Hours since intake was last actioned |\n| `pending_since_days` | `FLOAT64` | Yes | Days since intake was last actioned\
    \ |\n\n### Enum values\n\n#### `status`\n\n- `Completed`\n- `Pending`\n- `In Progress`\n- `Cancelled`\n\n#### `priority`\n\
    \n- `High`\n- `Medium`\n- `Low`\n\n---\n\n## Join map\n\n```\ncontracts.workflow_id ─────────────► workflows_setup.workflow_id\n\
    contracts.frozen_workflow_id ───────► workflows_setup.frozen_workflow_id\ncontracts.contract_type_id ─────────► contract_types_setup.contract_type_id\n\
    contracts.counterparty_name ────────► counterparties_setup.counterparty_name (join on public name)\nworkflows_setup.frozen_workflow_id\
    \ ─► approvals_setup.frozen_workflow_id\nworkflows_setup.workflow_id ────────► signatures_setups.workflow_id\n\ncontract_lifecycle.contract_id\
    \ ─────► contract_tat_details.contract_id\ncontract_lifecycle.contract_id ─────► contract_sign.contract_id\ncontract_lifecycle.contract_id\
    \ ─────► contract_approvals.contract_id\ncontract_lifecycle.contract_id ─────► contracts_review.contract_id\ncontract_lifecycle.contract_id\
    \ ─────► signatories.contract_id\ncontract_lifecycle.contract_id ─────► contract_level_metrics.contract_id\ncontract_lifecycle.contract_id\
    \ ─────► contract_level_metrics_lc.contract_id\n```\n\nUse **public** column names in SQL. Table references may use bare\
    \ catalog names (e.g. `contracts`); matching is case-insensitive."
paths:
  /api/v2.1/public/analytics/query/:
    post:
      operationId: v2.1_public_analytics_query_create
      description: "Runs **read-only** analytics SQL in **GoogleSQL** (Google Standard SQL), including for timestamps, dates,\
        \ and functions. Submit exactly one **`SELECT`** statement (optional **`WITH`** / **`UNION`**). Inserts, updates,\
        \ deletes, DDL, and multi-statement batches are rejected.\n\n**Enablement**  \nThis capability must be enabled for\
        \ your workspace. If it is not, the API returns **501** with code `SD_PUBLIC_00045`. Contact SpotDraft support to\
        \ request access.\n\n**Authentication**  \nOAuth 2.0 Bearer JWT in the `Authorization` header (same Public API OAuth\
        \ flow as other v2.1 endpoints). The authenticated principal must be authorized in the same organizational context\
        \ as the token.\n\n**Permission**  \n**Insights view** (`INSIGHTS_VIEW`).\n\n**Contracts scoping**  \nBy default,\
        \ the **`Contracts`** table is limited to rows the authenticated user may access. Optional body field **`user_scoped`**\
        \ or header **`X-Spotdraft-Analytics-User-Scoped`** (`true` / `false`, or `1` / `0`, `yes` / `no`) overrides that.\
        \ When both are omitted, the default is **`true`** in this environment. **`user_scoped: false`** (or the header equivalent)\
        \ allows workspace-wide contract rows only for users with the workspace **Admin** role; others receive **403** with\
        \ `SD_PUBLIC_00044`.\n\n**Tables and columns**  \nUse **bare catalog table names** (e.g. `Contracts`, `Users`) and\
        \ **snake_case** public column names from the table catalog (e.g. `execution_time`, `workflow_id`). Only allowlisted\
        \ tables and columns are accepted.\n\n**Allowlisted tables (quick reference)**  \n\n| Table in SQL | Role |\n|---|---|\n\
        | `Contracts` | Core contract fact table |\n| `Users` | Users / org users |\n| `Workflows_setup` | Workflow definitions\
        \ (incl. frozen versions) |\n| `Contract_types_setup` | Contract type lookup |\n| `Counterparties_setup` | Counterparty\
        \ directory |\n| `Approvals_Setup` | Approval steps in workflows |\n| `Entities_setup` | Legal entities |\n| `Signatures_setups`\
        \ | Signatory configuration per workflow |\n\nFor full column lists, types, and join guidance, see **[SpotDraft public\
        \ analytics table catalog](#analytics-query-table-catalog)** (also under **External documentation**).\n\n**Limits\
        \ (this deployment)**  \n- At most **5,000** rows per response; `truncated` is **true** when more rows would have\
        \ matched.  \n- Query job timeout: **60 seconds**.  \n- Maximum bytes billed per query job: **500 MB** (500,000,000\
        \ bytes).  \n- SQL text length limit: **10,000** characters per request.  \n\n**Errors**  \n\n| Code | HTTP | Meaning\
        \ |\n|---|---:|---|\n| `SD_PUBLIC_00040` | 400 | Not an allowed read-only SELECT, or more than one statement |\n|\
        \ `SD_PUBLIC_00041` | 400 | References a table outside the allowlisted catalog |\n| `SD_PUBLIC_00042` | 400 | Query\
        \ could not be parsed or transpiled safely |\n| `SD_PUBLIC_00043` | 502 | Query execution failed |\n| `SD_PUBLIC_00044`\
        \ | 403 | Workspace-wide contracts requested without workspace Admin role |\n| `SD_PUBLIC_00045` | 501 | Analytics\
        \ query API not enabled for this workspace |\n"
      summary: Execute Read-only Analytics SQL (GoogleSQL)
      externalDocs:
        description: Analytics table catalog (columns, types, joins).
        url: '#analytics-query-table-catalog'
      tags:
      - V2.1 Analytics Query
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicAnalyticsQueryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PublicAnalyticsQueryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PublicAnalyticsQueryRequest'
        required: true
      security:
      - ClientId: []
        ClientSecret: []
      - OAuthBearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicAnalyticsQueryResponse'
          description: Query result
        '501':
          description: Feature flag not enabled
      x-tagGroup: Platform

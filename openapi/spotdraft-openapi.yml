    CreateCounterPartyAPIRequest:
      title: CreateCounterPartyAPIRequest
      type: object
      properties:
        is_individual:
          title: Is Individual
          description: Defines if this Counterparty is an individual or an organization like a company. When `true`, `contact_name`
            and `contact_email` are required. When `false`, `organization_name` is required.
          type: boolean
        organization_type:
          title: Organization Type
          description: The type of the counterparty if it is an organization. Expects values like LLC, LLP, etc. Please ask
            help@spotdraft.com for valid values.
          type: string
        organization_name:
          title: Organization Name
          description: The name of the counterparty if it is an organization. Expects the name of the company/entity that
            is the counterparty. Required when `is_individual=false`.
          type: string
        contact_name:
          title: Contact Name
          description: The name of the counterparty in case of an individual, and the name of the Point of Contact in case
            of organizations. Required together with `contact_email` when `is_individual=true`.
          type: string
        contact_email:
          title: Contact Email
          description: The email of the counterparty in case of an individual, and the email of the Point of Contact in case
            of organizations. Required together with `contact_name` when `is_individual=true`.
          type: string
        brand_name:
          title: Brand Name
          description: The brand name of the counterparty. This is typically used for display purposes and contract templates.
          type: string
        primary_address:
          title: Primary Address
          type: object
          properties:
            line_one:
              title: Line One
              description: The first line of the address. Usually the apartment, floor, and street information.
              type: string
            city_name:
              title: City Name
              description: The city name for this address.
              type: string
            state_name:
              title: State Name
              description: The state name for this address.
              default: ''
              type: string
            zipcode:
              title: Zipcode
              description: The zip/pin/postal code for this address.
              default: ''
              type: string
            email:
              title: Email
              description: The email address associated with this counterparty address (if any).
              type: string
            phone:
              title: Phone
              description: The phone number associated with this counterparty address (if any).
              type: string
            country_name:
              title: Country Name
              description: The name of the country associated with this counterparty address. Any value passed here is ignored
                if `country_iso_code` is passed. Valid values are defined internally. Please ask help@spotdraft.com for more
                information.
              type: string
            country_iso_code:
              title: Country Iso Code
              description: The ISO-3166-1 Alpha-2 code of the country associated with this counterparty address. Any value
                passed here is overrides `country`. Valid values can be found [here](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes).
              type: string
          required:
          - line_one
          - city_name
          - country_name
          examples:
          - line_one: 'st: 3, block: 2, Jenkins Road'
            city_name: Cincinnati
            state_name: Ohio
            zipcode: '513'
            country_name: USA
            email: test@yopmail.com
            phone: '1234567890'
            country_iso_code: US
          description: The address details of the counterparty. Used to render the address in the contract templates.
        custom_fields:
          title: Custom Fields
          description: 'Custom field values for the counterparty. Note: The custom_fields feature is available only upon request.
            To enable this feature, please contact help@spotdraft.com'
          type: object
      required:
      - is_individual
      examples:
      - is_individual: false
        organization_type: Private Limited
        organization_name: Acme Corporation
        contact_name: Mike Reed
        contact_email: Mike_reed@yahoo.com
        brand_name: Acme Corporation
        primary_address:
          city_name: Cincinnati
          state_name: Ohio
          country_name: USA
          zipcode: '513'
          line_one: 'st: 3, block: 2, Jenkins Road'
        custom_fields:
          vendor_id: '1234'
          gst_number: 22AAAAA0000A1Z5

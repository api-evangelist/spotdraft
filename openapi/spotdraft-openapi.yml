          items:
            title: TaskAssigneeCreateRequest
            type: object
            properties:
              org_user_id:
                title: Org User Id
                type: integer
              role_id:
                title: Role Id
                type: integer
        reminders:
          title: Reminders
          description: List of reminders relative to the due date. Reminder values must use the supported duration object
            shape.
          type: array
          items:
            title: ReminderRelativeTime
            type: object
            properties:
              value:
                title: Value
                description: The value of the reminder relative time
                type: integer
              type:
                title: DurationKind
                description: The type of the reminder relative time
                enum:
                - DAYS
                - WEEKS
                - MONTHS
                - YEARS
                default: DAYS
              days:
                title: Days
                description: The number of days for the reminder relative time
                type: integer
            required:
            - value
            - days

      type: object
      description: Defines the data that is required for contract creation
      properties:
        contract_template_id:
          type: integer
          description: ID of the SpotDraft contract template used to generate the contract.
        contract_data:
          description: 'A key-value object where each key must match a template field name from the contract template.


            Values should use the data type expected by that template field. Common patterns include:

            - `string`: free-form text

            - `number`: integer or decimal values

            - `boolean`: `true` or `false`

            - `date`: `YYYY-MM-DD`

            - `datetime`: ISO 8601 timestamp such as `2026-03-28T10:15:00Z`

            - `duration`: `{ "type": "MONTHS" | "YEARS" | "DAYS", "value": number, "days": number }`

            - `currency`: `{ "type": "USD" | "INR" | ... , "value": number }`

            - `dropdown`: the selected option value as configured in the template

            - `multi_select`: an array of selected option values

            - `address`: an object such as `{ "line_one": ..., "city": ..., "country": ..., "zipcode": ... }`

            - `repeating`: an array of row objects for repeating groups or dynamic tables

            - `file`: a file object or uploaded file reference where the workflow supports attachments


            Use template field names exactly as configured in SpotDraft.'
        counter_party_details:
          type: array
          items:
            $ref: '#/components/schemas/ExternalCounterPartyDetails'
          description: A list of counterparties involved in the contract. At least one counterparty must be provided.
        external_metadata:
          description: Optional external system metadata to associate with the contract, such as a CRM or ERP record reference.
        entity_reference_id:
          type: string
          description: Optional creator organization entity reference ID. If omitted, SpotDraft uses the primary organization
            entity for the creator organization.
        workflow_config:
          $ref: '#/components/schemas/WorkflowConfig'
        send_to_counterparty_config:
          allOf:
          - $ref: '#/components/schemas/SendToCounterparty'
          description: Optional email-delivery settings to apply when sending the contract to counterparties.
        contract_name:
          type: string
          description: Optional contract display name. If omitted, SpotDraft derives the contract name from the workflow or
            template configuration.
        signatories:
          type: array
          items:
            $ref: '#/components/schemas/ExternalCreateContractSignatory'
          description: An optional list of signatories for the contract. If provided, each signatory must be associated with
            a counterparty specified in `counter_party_details`.
        is_embedded_contract:
          type: boolean
          default: false
          description: Set to true when the contract will be used in an embedded signing flow.
      required:
      - contract_data
      - contract_template_id
      - counter_party_details
    ExternalCreateContractApprovalRequestList:
      title: ExternalCreateContractApprovalRequestList
      type: object
      properties:
        approvals:
          title: Approvals
          description: List of information that needs to be provided in order to create multiple Approvals.
          type: array
          items:
            title: ExternalCreateContractApprovalRequest
            type: object
            properties:
              name:
                title: Name
                description: The name that will be used to represent the approval in Spotdraft.
                type: string
              approver_user_id:
                title: Approver User Id
                description: The ID of the user who has to take action on this Approval. Either `approver_user_id` or `approver_role_id`
                  must be set, but not both. Use the [Get User List](#tag/v21-users/GET/api/v2.1/public/auth/users/) API to
                  get the user ID.
                type: integer
              approver_role_id:
                title: Approver Role Id
                description: The ID of the role that has to take action on this Approval. Either `approver_user_id` or `approver_role_id`
                  must be set, but not both. Use the [Get Active Roles](#tag/v21-users/GET/api/v2.1/public/auth/roles/) API
                  to get the role ID.
                type: integer
              notes:
                title: Notes
                description: The message that will be sent to the approver along with the approval request.
                type: string
              order:
                title: Order
                description: The order denotes the sequence in which the approval requests will be sent to the approver of
                  each approval. Lower values of order are sent before higher values of order. Approvals with same order will
                  be sent to the approver at the same time.
                type: integer
            required:
            - name
            - notes
      required:
      - approvals
      examples:
      - approvals:
        - name: Legal Approval
          approver_user_id: 10324
          notes: Please take a look need your approval.
          order: 1
        - name: Finance team Approval
          approver_role_id: 60414
          notes: Hi team need your approval on this contract.
          order: 2
    ExternalCreateContractCommentRequest:
      title: ExternalCreateContractCommentRequest
      type: object

            format `!!@{user_id}!!`, where the user id must belong to the same workspace. Use the [Get User List](#tag/v21-users/GET/api/v2.1/public/auth/users/)
            API to fetch valid user ids.
          type: string
      required:
      - comment
      examples:
      - comment: Hey !!@12310!! please review this contract.
    ExternalCreateContractResponse:
      type: object

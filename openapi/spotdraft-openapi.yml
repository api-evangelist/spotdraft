  /api/v2.1/public/contracts/{composite_id}/content:
    get:
      operationId: v2.1_public_contracts_content_retrieve
      description: "\n        Retrieve the text content of a contract in different formats.\n\n        **Formats:**\n    \
        \    - `text`: Returns the full contract text as a single string\n        - `segments`: Returns the contract text\
        \ as an array of segments with metadata\n\n        **Feature Flags:**\n        This API requires `FULL_TEXT_SEARCH`\
        \ to be enabled for the workspace.\n\n        **Content Availability:**\n        Content must be previously extracted\
        \ to be available through this API.\n\n        This API supports user scoping when the 'Enforce-User-Scoping'\n  \
        \  header is set to 'true'. When enabled, the API will only return content for\n    contracts that the specified user\
        \ has access to based on their permissions.\n        "
      summary: Get Contract Content
      parameters:
      - in: path
        name: composite_id
        schema:
          type: string
        description: ID of the Contract. Should be of the form T-123 or H-123. T stands for Template contracts and H stands
          for Historical contracts.
        required: true
      - in: query
        name: contract_version_id
        schema:
          type: integer
        description: ID of the contract version. If not provided, latest published version is used.
      - in: query
        name: text_format
        schema:
          type: string
          enum:
          - segments
          - text
          default: text
        description: Format of the returned content (text or segments)
      tags:
      - V2.1 Contract APIs
      security:
      - ClientId: []
        ClientSecret: []
      - OAuthBearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractContentResponse'
              examples:
                Example1:
                  value:
                    contract_id: T-12345
                    content_format: text
                    content: This Agreement is entered into between...
                    segments: null
                    extraction_status: completed
                    last_updated: '2024-01-15T10:30:00Z'
                  summary: Example 1
                Example2:
                  value:
                    contract_id: T-12345
                    content_format: segments
                    content: null
                    segments:
                    - segment_text: This Agreement is entered into...
                      page_number: 1
                      position: 1
                    extraction_status: completed
                    last_updated: '2024-01-15T10:30:00Z'
                  summary: Example 2
          description: Success
        '400':
          description: Invalid format parameter
        '404':
          description: Contract not found
      x-tagGroup: Contracts

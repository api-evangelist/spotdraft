    GenerateContractPreviewRequest:
      title: GenerateContractPreviewRequest
      type: object
      properties:
        contract_template_id:
          title: Contract Template Id
          description: ID of the SpotDraft contract template used to render the preview.
          type: integer
        contract_data:
          title: Contract Data
          description: 'A key-value object where each key must match a template field name from the contract template.


            Values should use the data type expected by that template field. Common patterns include:

            - `string`: free-form text

            - `number`: integer or decimal values

            - `boolean`: `true` or `false`

            - `date`: `YYYY-MM-DD`

            - `datetime`: ISO 8601 timestamp such as `2026-03-28T10:15:00Z`

            - `duration`: `{ "type": "MONTHS" | "YEARS" | "DAYS", "value": number, "days": number }`

            - `currency`: `{ "type": "USD" | "INR" | ... , "value": number }`

            - `dropdown`: the selected option value as configured in the template

            - `multi_select`: an array of selected option values

            - `address`: an object such as `{ "line_one": ..., "city": ..., "country": ..., "zipcode": ... }`

            - `repeating`: an array of row objects for repeating groups or dynamic tables

            - `file`: a file object or uploaded file reference where the workflow supports attachments


            Use template field names exactly as configured in SpotDraft.'
          type: object
        organization_entity_id:
          title: Organization Entity Id
          description: Optional creator organization entity id used while rendering the preview.
          type: integer
        counter_party_details:
          title: Counter Party Details
          description: Optional counterparties used to render counterparty variables in the preview. For organizational counterparties,
            `organization_name` is required.
          type: array
          items:
            title: CounterPartyDetails
            type: object
            properties:
              is_individual:
                title: Is Individual
                description: Defines if this Counterparty is an individual or an organization like a company
                type: boolean
              organization_type:
                title: Organization Type
                description: The type of the counterparty if it is an organization. Expects values like LLC, LLP, etc. Please
                  ask help@spotdraft.com for valid values.
                type: string
              organization_name:
                title: Organization Name
                description: The name of the counterparty if it is an organization. Expects the name of the company/entity
                  that is the counterparty. Required when `is_individual=false`.
                type: string
              organization_details:
                title: Organization Details
                type: object
                properties:
                  jurisdiction:
                    title: Jurisdiction
                    description: The jurisdiction to which this organization belongs. Valid values are defined internally.
                      Please reach out to help@spotdraft.com for a list.
                    type: string
                  address:
                    title: Address
                    type: object
                    properties:
                      city:
                        title: City
                        description: The city name for this address.
                        type: string
                      state:
                        title: State
                        description: The state name for this address.
                        default: ''
                        type: string
                      country:
                        title: Country
                        description: The name of the country associated with this counterparty address. Any value passed here
                          is ignored if `country_iso_code` is passed. Valid values are defined internally. Please ask help@spotdraft.com
                          for more information.
                        type: string
                      zipcode:
                        title: Zipcode
                        description: The zip/pin/postal code for this address.
                        default: ''
                        type: string
                      line_one:
                        title: Line One
                        description: The first line of the address. Usually the apartment, floor, and street information.
                        type: string
                      line_two:
                        title: Line Two
                        description: The second address line (if any).
                        type: string
                      email:
                        title: Email
                        description: The email address associated with this counterparty address (if any).
                        type: string
                      phone:
                        title: Phone
                        description: The phone number associated with this counterparty address (if any).
                        type: string
                      gst_number:
                        title: Gst Number
                        description: The GST Number for this Organization. Can be unset if not available or applicable.
                        type: string
                      tax_id:
                        title: Tax Id
                        description: The VAT/GST/Sales Tax/etc ID for this Organization.
                        type: string
                      country_iso_code:
                        title: Country Iso Code
                        description: The ISO-3166-1 Alpha-2 code of the country associated with this counterparty address.
                          Any value passed here is overrides `country`. Valid values can be found [here](https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes).
                        type: string
                    required:
                    - city
                    - country
                    - line_one
                    description: The primary address for this organization (if any)
                description: Additional details for an organization. Should be set if `is_individual=False`
              poc_details:
                title: Poc Details
                type: object
                properties:
                  first_name:
                    title: First Name
                    description: The first name of the Point of Contact
                    type: string
                  last_name:
                    title: Last Name
                    description: The last name of the Point of Contact
                    type: string
                  email:
                    title: Email
                    description: The email address of the Point of Contact
                    type: string
                required:
                - first_name
                - last_name
                - email
                description: Point of Contact details for this counterparty. Should be the details of the individual for `is_individual=True`
                  and the details of the contact at the counterparty organization in case of `is_individual=False`.
              party_role_identifier:

          title: ContractDisplayStatus
          description: An enumeration.
        display_status_without_on_hold_check:
          allOf:
          - $ref: '#/components/schemas/ContractDisplayStatusEnum'
          title: ContractDisplayStatus
          description: An enumeration.
        workflow_status:
          allOf:
          - $ref: '#/components/schemas/WorkflowStatusEnum'
          title: ContractWorkflowStatus
          description: An enumeration.
        contract_kind:
          allOf:
          - $ref: '#/components/schemas/ContractMinimalResponseV2ContractKindEnum'
          title: ContractKind
          description: An enumeration.
        campaign_id:
          title: Campaign Id
          type: integer
        campaign_v3_id:
          title: Campaign V3 Id
          type: integer
        express_template_id:
          title: Express Template Id
          type: integer
        contract_data_id:
          title: Contract Data Id
          type: integer
        contract_editable_document_id:
          title: Contract Editable Document Id
          type: integer
        created:
          title: Created
          type: string
          format: date-time
        created_by_workspace_id:
          title: Created By Workspace Id
          type: integer
        editor_client:
          allOf:
          - $ref: '#/components/schemas/EditorClientEnum'

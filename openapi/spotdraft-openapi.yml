    ExternalRelatedContractListResponse:
      title: ExternalRelatedContractListResponse
      type: object
      properties:
        page:
          title: Page
          description: Current page number
          type: integer
        limit:
          title: Limit
          description: Number of results per page
          type: integer
        total_results:
          title: Total Results
          description: Total number of related contracts
          type: integer
        results:
          title: Results
          description: List of related contracts
          type: array
          items:
            title: ExternalRelatedContractResponse
            type: object
            properties:
              id:
                title: Id
                description: Contract Relation ID
                type: integer
              contract:
                title: Contract
                type: object
                properties:
                  id:
                    title: Id
                    description: ID of the related contract
                    type: integer
                  name:
                    title: Name
                    description: Name of the related contract
                    type: string
                  counter_party_list:
                    title: Counter Party List
                    description: List of counterparty names associated with the contract
                    type: array
                    items:
                      type: string
                  display_status:
                    title: ContractDisplayStatus
                    description: Current display status of the contract
                    enum:
                    - DRAFT
                    - REDLINING
                    - SIGN
                    - EXECUTED
                    - ON_HOLD
                    - VOIDED
                    type: string
                required:
                - id
                - name
                - counter_party_list
                - display_status
                description: Details of the related contract
              relation_type:
                title: Relation Type
                description: Type of relationship (CHILD, ADDENDUM, AMENDMENT, PARENT)
                type: string
            required:
            - id
            - contract
            - relation_type
            examples:
            - id: 1000
              contract:
                id: 1234
                name: Acme Corporation NDA
                counter_party_list:
                - Acme Corp
                display_status: EXECUTED
              relation_type: CHILD
      required:
      - page
      - limit
      - total_results
      - results
      examples:
      - page: 1
        limit: 10
        total_results: 2
        results:
        - id: 1000
          contract:
            id: 1234
            name: Acme Corporation NDA
            counter_party_list:
            - Acme Corp
            display_status: EXECUTED
          relation_type: CHILD
        - id: 1001
          contract:
            id: 5678
            name: Acme Corporation MSA
            counter_party_list:
            - Acme Corp
            display_status: DRAFT
          relation_type: AMENDMENT

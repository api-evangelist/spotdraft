        \ to check if the contract is scanned and extract the text content.\n        /is_scanned_pdf to check if the contract\
        \ is scanned and /scanned_pdf_to_text to extract the text content from the scanned PDF.\n\n        This API supports\
        \ user scoping when the 'Enforce-User-Scoping'\n        header is set to 'true'. When enabled, the API will only return\
        \ content for\n        contracts that the specified user has access to based on their permissions.\n\n        Optionally\
        \ pass `contract_version_id` as a query parameter to use a specific\n        contract version; otherwise the last\
        \ published version is used.\n        "

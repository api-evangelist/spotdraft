    ContractMinimalResponseV2:
      title: ContractMinimalResponseV2
      description: "Minimal response model for a contract.\nAttributes:\n    id (ContractId): The ID of the contract.\n  \
        \  public_id (str): Public ID of the contract.\n    contract_name (str): Name of the contract.\n    contract_type_id\
        \ (ContractTypeId): ID of the contract type.\n    contract_template_id (Optional[int], optional): ID of the associated\
        \ contract template.\n    status (str): Status of the contract.\n    display_status (ContractDisplayStatus): Display\
        \ status of the contract.\n    display_status_without_on_hold_check (ContractDisplayStatus):\n        Display status\
        \ of the contract without on-hold check.\n    workflow_status (Optional[ContractWorkflowStatus], optional): Workflow\
        \ status of the contract.\n    contract_kind (ContractKind): Kind of the contract.\n    campaign_id (Optional[int],\
        \ optional): ID of the associated campaign.\n    campaign_v3_id (Optional[CampaignId], optional): ID of the associated\
        \ campaign (v3).\n    express_template_id (Optional[int], optional): ID of the express template.\n    contract_data_id\
        \ (Optional[int], optional): ID of the contract data.\n    contract_editable_document_id (Optional[int], optional):\
        \ ID of the editable document related to the contract.\n    created (datetime): Date and time when the contract was\
        \ created.\n    created_by_workspace_id (WorkspaceId): ID of the workspace where the contract was created.\n    editor_client\
        \ (ContractEditorClient): Client editor of the contract.\n    execution_date (Optional[datetime], optional): Date\
        \ and time of contract execution.\n    frozen_template_id (Optional[int], optional): ID of the frozen contract template.\n\
        \    workflow_id (str): ID of the workflow associated with the contract.\n\nMethods:\n    is_executed() -> bool:\n\
        \        Checks if the contract is executed.\n\n    is_voided() -> bool:\n        Checks if the contract is voided.\n\
        \n    is_historic_upload() -> bool:\n        Checks if the contract is a historic upload.\n\n    contract_response_v2()\
        \ -> ContractResponseV2:\n        Retrieves the full response object for the contract.\n\n    get_fields_to_select()\
        \ -> List[str]:\n        Retrieves the list of fields to select for the contract."
      type: object
      properties:
        id:
          title: Id
          type: integer
        public_id:
          title: Public Id
          type: string
        contract_name:
          title: Contract Name
          type: string
        contract_type_id:
          title: Contract Type Id
          type: integer
        contract_template_id:
          title: Contract Template Id
          type: integer
        status:
          title: Status
          type: string
        display_status:

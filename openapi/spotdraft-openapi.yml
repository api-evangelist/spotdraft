      - id
      - reference_id
    ExternalCreateContractSerializerV2_1:
      type: object
      description: Defines the data that is required for contract creation for API V2.1
      properties:
        contract_template_id:
          type: integer
          description: ID of the SpotDraft contract template used to generate the contract.
        contract_data:
          description: 'A key-value object where each key must match a template field name from the contract template.


            Values should use the data type expected by that template field. Common patterns include:

            - `string`: free-form text

            - `number`: integer or decimal values

            - `boolean`: `true` or `false`

            - `date`: `YYYY-MM-DD`

            - `datetime`: ISO 8601 timestamp such as `2026-03-28T10:15:00Z`

            - `duration`: `{ "type": "MONTHS" | "YEARS" | "DAYS", "value": number, "days": number }`

            - `currency`: `{ "type": "USD" | "INR" | ... , "value": number }`

            - `dropdown`: the selected option value as configured in the template

            - `multi_select`: an array of selected option values

            - `address`: an object such as `{ "line_one": ..., "city": ..., "country": ..., "zipcode": ... }`

            - `repeating`: an array of row objects for repeating groups or dynamic tables

            - `file`: a file object or uploaded file reference where the workflow supports attachments


            Use template field names exactly as configured in SpotDraft.'
        counter_party_details:
          type: array
          items:
            $ref: '#/components/schemas/ExternalCounterPartyDetailsSerializerV2_1'
          description: A list of counterparties involved in the contract. Use ISO country and jurisdiction codes in v2.1 organization
            details.
        external_metadata:
          description: Optional external system metadata to associate with the contract, such as a CRM or ERP record reference.
        entity_reference_id:
          type: string
          description: Optional creator organization entity reference ID. If omitted, SpotDraft uses the primary organization
            entity for the creator organization.
        workflow_config:
          $ref: '#/components/schemas/WorkflowConfig'
        send_to_counterparty_config:
          allOf:
          - $ref: '#/components/schemas/SendToCounterparty'
          description: Optional email-delivery settings to apply when sending the contract to counterparties.
        contract_name:
          type: string
          description: Optional contract display name. If omitted, SpotDraft derives the contract name from the workflow or
            template configuration.
        signatories:
          type: array
          items:
            $ref: '#/components/schemas/ExternalCreateContractSignatory'
          description: An optional list of signatories for the contract. If provided, each signatory must be associated with
            a counterparty specified in `counter_party_details`.
        is_embedded_contract:
          type: boolean
          default: false
          description: Set to true when the contract will be used in an embedded signing flow.
      required:
      - contract_data
      - contract_template_id
      - counter_party_details
    ExternalCreateContractSignatory:
      type: object
      description: Defines the data that is required for create contract signatory
      properties:
        name:
          type: string
        email:
          type: string
        title:
          type: string
        is_counterparty_signatory:
          type: boolean
          description: Set this as True if the signatory belongs to a counterparty. Else set it as False.
        counterparty_name:
          type: string
          description: Required if `is_counterparty_signatory` is True. Must match the name of one of the counterparties in
            `counter_party_details`. If the counterparty `is_individual` is True, this should be the concatenation of the
            `first_name` and `last_name` from `poc_details` (e.g., 'John Doe'). If `is_individual` is False, this should match
            the `organization_name` of the counterparty.  If `is_counterparty_signatory` is False, leave this field blank.
        sign_order:
          type: integer
        note:
          type: string
      required:
      - email
      - is_counterparty_signatory
      - name
    ExternalGetRecipientLinkResponse:
      title: ExternalGetRecipientLinkResponse

  /api/v2/public/contracts/preview/:
    post:
      operationId: v2_public_contracts_preview_create
      description: "Generates a preview PDF using the supplied contract data without creating or updating a contract.\n\n\
        Use this to validate how template variables render before you create the actual contract.\n\n\nThe `contract_data`\
        \ object must use **template field names as keys**. Each value should match the data type configured for that field\
        \ in SpotDraft.\n\n| Field type | Expected value | Example |\n| ---------- | -------------- | ------- |\n| String\
        \ / text | String | `\"Acme Inc.\"` |\n| Multi-line text | String with line breaks if needed | `\"Not applicable\\\
        nCustomer redlines pending\"` |\n| Number | Integer or decimal | `15` or `3.14` |\n| Boolean / checkbox | Boolean\
        \ | `true` |\n| Date | `YYYY-MM-DD` | `\"2026-03-28\"` |\n| Datetime | ISO 8601 timestamp | `\"2026-09-15T10:30:00Z\"\
        ` |\n| Dropdown | Selected option value | `\"annual_invoice\"` |\n| Multi-select | Array of selected option values\
        \ | `[\"US\", \"IN\"]` |\n| Currency | `{ \"type\": \"<ISO currency>\", \"value\": number }` | `{ \"type\": \"USD\"\
        , \"value\": 12000 }` |\n| Duration | `{ \"days\": int, \"type\": \"DAYS\\|MONTHS\\|YEARS\", \"value\": int }` | `{\
        \ \"days\": 180, \"type\": \"MONTHS\", \"value\": 6 }` |\n| Address | Object with address fields | `{ \"line_one\"\
        : \"350 Fifth Avenue\", \"city\": \"New York\", \"country\": \"United States\" }` |\n| Repeating group | Array of\
        \ row objects | `[{\"milestone\": \"Implementation\", \"amount\": {\"type\": \"USD\", \"value\": 5000}}]` |\n| File\
        \ / attachment | File object or uploaded file reference supported by the workflow | `{ \"file_name\": \"security-schedule.pdf\"\
        , \"content_type\": \"application/pdf\" }` |\n\nSample contract data:\n\n```json\n{\n  \"agreement_date\": \"2026-03-28\"\
        ,\n  \"renewal_review_at\": \"2026-09-15T10:30:00Z\",\n  \"customer_name\": \"Acme Inc.\",\n  \"billing_currency\"\
        : {\"type\": \"USD\", \"value\": 12000},\n  \"subscription_term\": {\"type\": \"MONTHS\", \"value\": 12, \"days\"\
        : 365},\n  \"auto_renewal\": true,\n  \"notice_period_days\": 30,\n  \"service_countries\": [\"US\", \"IN\"],\n  \"\
        billing_address\": {\n    \"line_one\": \"350 Fifth Avenue\",\n    \"city\": \"New York\",\n    \"state\": \"NY\"\
        ,\n    \"country\": \"United States\",\n    \"zipcode\": \"10118\"\n  },\n  \"pricing_schedule\": [\n    {\"milestone\"\
        : \"Implementation\", \"amount\": {\"type\": \"USD\", \"value\": 5000}},\n    {\"milestone\": \"Annual subscription\"\
        , \"amount\": {\"type\": \"USD\", \"value\": 7000}}\n  ],\n  \"msa_attachment\": {\"file_name\": \"security-schedule.pdf\"\
        , \"content_type\": \"application/pdf\"}\n}\n```\n"
      summary: Generate Contract Preview
      tags:
      - V2 Contract APIs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateContractPreviewRequest'
            examples:
              PreviewRequest:
                value:
                  contract_template_id: 1204
                  contract_data:
                    agreement_date: '2026-03-28'
                    customer_name: Acme Inc.
                    subscription_term:
                      type: MONTHS
                      value: 12
                      days: 365
                    billing_currency:
                      type: USD
                      value: 12000
                  counter_party_details:
                  - name: Acme Inc.
                    email: legal@acme.example
                summary: Preview request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GenerateContractPreviewRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GenerateContractPreviewRequest'
        required: true
      security:
      - ClientId: []
        ClientSecret: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: Preview PDF File
      x-tagGroup: Contracts
  /api/v2/public/contracts/upload_review_contracts/:
    post:
      operationId: v2_public_contracts_upload_review_contracts_create
      description: "\nThis API endpoint supports uploading Third-Party Paper (TPP) contracts and optionally allows for a review\
        \ request.\n\n`contract_type_id` must be linked to a published Third-Party Paper upload workflow.\nIf this linkage\
        \ is missing, the API can fail with `SD_CONTRACTS_00289`.\n\nIt accepts intake form data.\n\nThe Intake Form Data\
        \ should have the following data types with the following output:\n<table>\n    <thead>\n    <tr>\n        <td>Type</td>\n\
        \        <td>Data Format</td>\n        <td>Sample</td>\n    </tr>\n    </thead>\n<tbody>\n    <tr>\n    <td>Duration</td>\n\
        \    <td>\n        <code>{\"days\": int, \"type\": DurationKind, \"value\": int}</code><br/>\n        `DurationKind`:\
        \ `DAYS` or `MONTHS` or `YEARS`\n    </td>\n    <td><code>{\"days\": 180, \"type\": \"MONTHS\", \"value\": 6}</code></td>\n\
        \    </tr>\n    <tr>\n    <td>Date</td>\n    <td>\n        String formatted date in form <code>YYYY-MM-dd</code>\n\
        \    </td>\n    <td><code>\"2019-11-29\"</code></td>\n    </tr>\n    <tr>\n    <td>Dropdown</td>\n    <td>\n     \
        \   Value as returned in <code>options</code>. Can be string or number.\n    </td>\n    <td><code>\"1\"</code></td>\n\
        \    </tr>\n    <tr>\n    <td>String</td>\n    <td>\n        A string value.\n    </td>\n    <td><code>\"Something\"\
        </code></td>\n    </tr>\n    <tr>\n    <td>Currency</td>\n    <td>\n        <code>{\"type\": CurrencyCode, \"value\"\
        : float}</code><br/>\n        Where currencyCode: \"INR\", \"USD\", \"SGD\", \"EUR\"\n    </td>\n    <td><code>{\"\
        type\": \"INR\", \"value\": 15000.00}</code></td>\n    </tr>\n    <tr>\n    <td>Check-box</td>\n    <td>\n       \
        \ A boolean value\n    </td>\n    <td><code>true</code></td>\n    </tr>\n    <tr>\n    <td>text-box</td>\n    <td>\n\
        \        A string value. Can be multi-line\n    </td>\n    <td><code>\"Not Applicable\\nBecause...\"</code></td>\n\
        \    </tr>\n    <tr>\n    <td>number</td>\n    <td>\n        A numeric value. Can be int or float\n    </td>\n   \
        \ <td><code>4</code> or <code>3.14</code></td>\n    </tr>\n</tbody>\n</table>\n\n\n### Sample Intake Form Data:\n\
        ```\n{\n    \"term\": {\"days\": 180, \"type\": \"MONTHS\", \"value\": 6},\n    \"notes\": \"Not Applicable\",\n \
        \   \"capacity\": 15,\n    \"setup_fee\": {\"type\": \"INR\", \"value\": 30000.00},\n    \"start_date\": \"2019-11-29\"\
        ,\n    \"yes_discounts\": false,\n    \"payment_method\": \"1\",\n    \"suggestions\": \"No suggestions\"\n}\n```\n"
      summary: Upload Contract for Review
      tags:
      - V2 Contract APIs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractUploadForReviewRequest'
            examples:
              UploadForReviewRequest:
                value:
                  contract_name: Acme Vendor Paper
                  contract_type_id: 1
                  file_name: vendor-paper.pdf
                  file_base64: base64 encoded string of the PDF file
                  creator_organization_entity_id: 1
                  counterparty_organization_name: Acme Corporation
                  counterparty_is_individual: false
                  counterparty_poc_details:
                    first_name: Avery
                    last_name: Stone
                    email: legal@acme.example
                  reviewer:
                    org_user_email: reviewer@spotdraft.example
                    description: Please review the indemnity clause and payment terms.
                  intake_form_data:
                    term:
                      days: 180
                      type: MONTHS
                      value: 6
                    notes: Customer requested revised indemnity clause.
                    capacity: 15
                    setup_fee:
                      type: USD
                      value: 30000.0
                    start_date: '2026-04-01'
                    payment_method: annual_invoice
                summary: Upload for review request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContractUploadForReviewRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractUploadForReviewRequest'
        required: true
      security:
      - ClientId: []
        ClientSecret: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractResponseV2'
              examples:
                Example1:
                  value:
                    id: T-1234
                    created: '2021-05-20T04:52:04Z'
                    contract_name: Acme Corporation NDA
                    contract_link: https://app.spotdraft.com/contracts/v2/4322
                    contract_status: EXECUTED
                    created_by: Morgan Freeman
                    counter_party_name: Mike Reed
                    contract_type_name: Historic
                    contract_type_id: 103
                    external_metadata: {}
                    created_by_user_name: Elena Kagan
                    created_by_user_email: elena@acme.com
                    created_by_workspace: 1
                  summary: Example 1
          description: Success
      x-tagGroup: Contracts

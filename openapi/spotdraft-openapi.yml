          type: string
        description: ID of the Contract. Should be of the form T-123 or H-123. T stands for Template contracts and H stands
          for Historical contracts.
        required: true
      - in: query
        name: contract_version_id
        schema:
          type: integer
        description: ID of the contract version. If not provided, latest published version is used.
      tags:
      - V2.1 Contract APIs
      security:
      - ClientId: []
        ClientSecret: []
      - OAuthBearer: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScannedContractContentResponse'
              examples:
                Example1:
                  value:
                    contract_id: 1090393
                    content: This Agreement is entered into between...
                  summary: Example 1
          description: Success

      properties:
        file_id:
          description: Unique identifier for the file.
          minLength: 1
          title: File Id
          type: string
        filename:
          description: Normalized stored file name. This may differ from the requested filename when a missing extension is
            inferred from the content type or invalid characters are sanitized.
          minLength: 1
          title: Filename
          type: string
        upload_url:
          description: URL to upload the file content.
          minLength: 1
          title: Upload Url
          type: string
        expires_at:
          description: Absolute time at which the upload URL expires.
          format: date-time
          title: Expires At
          type: string
      required:
      - file_id
      - filename
      - upload_url
      - expires_at

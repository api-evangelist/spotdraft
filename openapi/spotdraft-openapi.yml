  /api/v2.1/public/contracts/{contract_id}/contract_data:
    patch:
      operationId: v2.1_public_contracts_contract_data_partial_update
      description: "Updates the structured contract data used to populate the contract template.\n\nUse this to refresh template\
        \ field values before the contract is finalized. Historic contracts are not supported for this endpoint.\n\n\nThe\
        \ `contract_data` object must use **template field names as keys**. Each value should match the data type configured\
        \ for that field in SpotDraft.\n\n| Field type | Expected value | Example |\n| ---------- | -------------- | -------\
        \ |\n| String / text | String | `\"Acme Inc.\"` |\n| Multi-line text | String with line breaks if needed | `\"Not\
        \ applicable\\nCustomer redlines pending\"` |\n| Number | Integer or decimal | `15` or `3.14` |\n| Boolean / checkbox\
        \ | Boolean | `true` |\n| Date | `YYYY-MM-DD` | `\"2026-03-28\"` |\n| Datetime | ISO 8601 timestamp | `\"2026-09-15T10:30:00Z\"\
        ` |\n| Dropdown | Selected option value | `\"annual_invoice\"` |\n| Multi-select | Array of selected option values\
        \ | `[\"US\", \"IN\"]` |\n| Currency | `{ \"type\": \"<ISO currency>\", \"value\": number }` | `{ \"type\": \"USD\"\
        , \"value\": 12000 }` |\n| Duration | `{ \"days\": int, \"type\": \"DAYS\\|MONTHS\\|YEARS\", \"value\": int }` | `{\
        \ \"days\": 180, \"type\": \"MONTHS\", \"value\": 6 }` |\n| Address | Object with address fields | `{ \"line_one\"\
        : \"350 Fifth Avenue\", \"city\": \"New York\", \"country\": \"United States\" }` |\n| Repeating group | Array of\
        \ row objects | `[{\"milestone\": \"Implementation\", \"amount\": {\"type\": \"USD\", \"value\": 5000}}]` |\n| File\
        \ / attachment | File object or uploaded file reference supported by the workflow | `{ \"file_name\": \"security-schedule.pdf\"\
        , \"content_type\": \"application/pdf\" }` |\n\nSample contract data:\n\n```json\n{\n  \"agreement_date\": \"2026-03-28\"\
        ,\n  \"renewal_review_at\": \"2026-09-15T10:30:00Z\",\n  \"customer_name\": \"Acme Inc.\",\n  \"billing_currency\"\
        : {\"type\": \"USD\", \"value\": 12000},\n  \"subscription_term\": {\"type\": \"MONTHS\", \"value\": 12, \"days\"\
        : 365},\n  \"auto_renewal\": true,\n  \"notice_period_days\": 30,\n  \"service_countries\": [\"US\", \"IN\"],\n  \"\
        billing_address\": {\n    \"line_one\": \"350 Fifth Avenue\",\n    \"city\": \"New York\",\n    \"state\": \"NY\"\
        ,\n    \"country\": \"United States\",\n    \"zipcode\": \"10118\"\n  },\n  \"pricing_schedule\": [\n    {\"milestone\"\
        : \"Implementation\", \"amount\": {\"type\": \"USD\", \"value\": 5000}},\n    {\"milestone\": \"Annual subscription\"\
        , \"amount\": {\"type\": \"USD\", \"value\": 7000}}\n  ],\n  \"msa_attachment\": {\"file_name\": \"security-schedule.pdf\"\
        , \"content_type\": \"application/pdf\"}\n}\n```\n"
      summary: Update Contract Data
      parameters:
      - in: path
        name: contract_id
        schema:
          type: string
        description: ID of the Contract. Should be of the form T-123 or H-123. T stands for Template contracts and H stands
          for Historical contracts.
        required: true
      - in: header
        name: user-email
        schema:
          type: string
        description: The email address of the user to act as (when using client-secret authentication). This header attributes
          actions taken using the API to the given user.
      tags:
      - V2.1 Contract APIs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedContractDataUpdateRequest'
            examples:
              Example1:
                value:
                  data:
                    term:
                      days: 180
                      type: MONTHS
                      value: 6
                    notes: Not Applicable
                    capacity: 15
                    setup_fee:
                      type: INR
                      value: 30000.0
                    start_date: '2019-11-29'
                    yes_discounts: false
                    payment_method: '1'
                    suggestions: No suggestions
                summary: Example 1
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedContractDataUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedContractDataUpdateRequest'
        required: true
      security:
      - ClientId: []
        ClientSecret: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchedContractDataUpdateRequest'
              examples:
                Example1:
                  value:
                    data:
                      term:
                        days: 180
                        type: MONTHS
                        value: 6
                      notes: Not Applicable
                      capacity: 15
                      setup_fee:
                        type: INR
                        value: 30000.0
                      start_date: '2019-11-29'
                      yes_discounts: false
                      payment_method: '1'
                      suggestions: No suggestions
                  summary: Example 1
          description: Updated Data
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    default: Contract cannot be updated because it has been executed.
                  code:
                    type: string
                    default: SD_PUBLIC_00009
          description: Contract cannot be updated in its current status
      x-tagGroup: Contracts

                        type: string
                      email:
                        title: Email
                        description: The email address associated with this counterparty address (if any).
                        type: string
                      phone:
                        title: Phone
                        description: The phone number associated with this counterparty address (if any).
                        type: string
                      gst_number:
                        title: Gst Number
                        description: The GST Number for this Organization. Can be unset if not available or applicable.
                        type: string
                      tax_id:
                        title: Tax Id
                        description: The VAT/GST/Sales Tax/etc ID for this Organization.

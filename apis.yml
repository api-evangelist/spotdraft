aid: spotdraft
name: SpotDraft
description: >-
  SpotDraft is an AI-powered Contract Lifecycle Management (CLM) platform headquartered in Bangalore, India, with
  offices in San Francisco, New York, and London. The platform lets legal, sales, procurement, and operations teams
  create, negotiate, sign, store, and analyze contracts in one place. Core capabilities include conditional workflows
  and approval routing, collaborative Word-based negotiation, a searchable contract repository with granular access
  controls, embedded SpotDraft AI for metadata extraction and risk flagging, ESIGN/EIDAS-compliant e-signatures,
  Clickwrap agreements, obligation tracking, and analytics dashboards. SpotDraft serves 450+ companies and is recognized
  as a Leader in the IDC MarketScape for AI-enabled buy-side CLMs and a G2 Leader. The company exposes a documented
  Public API (OpenAPI 3.0.3) with versions v1, v2, and v2.1 covering contracts, templates, counterparties, approvals,
  workflows, clickwrap, webhooks, analytics, users, and organizations across four regional clusters (India, United
  States, European Union, Middle East). Webhooks notify external systems of contract lifecycle events in real time.
  Native integrations exist for Salesforce, HubSpot, Zoho, Slack, Microsoft Teams, Google Drive, Dropbox, Box, OneDrive,
  SharePoint, DocuSign, Okta, Jira, Coupa, Zapier, and Greenhouse.

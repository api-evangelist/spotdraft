apis:
  - aid: spotdraft:spotdraft-public-api
    name: SpotDraft Public API
    description: >-
      The SpotDraft Public API is a unified OpenAPI 3.0.3 surface for managing contracts, templates, counterparties,
      approvals, metadata, obligations, versions, recipients, clickwrap agreements, webhooks, analytics, users,
      organizations, and workspaces. Endpoints are versioned (v1, v2, v2.1) and are served from four regional clusters
      (api.in.spotdraft.com, api.us.spotdraft.com, api.eu.spotdraft.com, api.me.spotdraft.com). Authentication uses
      Client ID + Client Secret or OAuth Bearer tokens generated from Developer Settings. The API exposes 148 paths
      across 48 tag groups and 211 component schemas. Webhooks deliver real-time notifications for contract lifecycle
      events.
    humanURL: https://api.spotdraft.com/api/docs/
    baseURL: https://api.us.spotdraft.com

        method: GET
        description: Get Template List
        outputRawFormat: json
        inputParameters:
        - name: cp_types
          in: query
          type: string
          required: false
        - name: cp_types_all
          in: query
          type: boolean
          required: false
        - name: exclude_multi_party
          in: query
          type: boolean
          required: false
        - name: include_archived
          in: query
          type: boolean
          required: false
        - name: tags
          in: query
          type: array
          required: false
        - name: tags_all
          in: query
          type: array
          required: false
    - name: v1-public-templates-template-id-metadata

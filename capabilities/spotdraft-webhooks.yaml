naftiko: 1.0.0-alpha2
info:
  label: SpotDraft Public API — Webhooks
  description: SpotDraft Webhooks capability. 4 operations across versions v1/v2/v2.1.
  tags:
  - SpotDraft
  - CLM
  - Contracts
  - Webhooks
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SPOTDRAFT_CLIENT_ID: SPOTDRAFT_CLIENT_ID
    SPOTDRAFT_CLIENT_SECRET: SPOTDRAFT_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: webhooks
    baseUri: https://api.us.spotdraft.com
    description: SpotDraft Webhooks endpoints.
    headers: {}
    resources:
    - name: v1-public-webhook-sample
      path: /api/v1/public/webhook-sample/
      operations:
      - name: v1-public-webhook-sample-create
        method: POST
        description: Sample Webhook Request
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: v2-1-public-webhooks
      path: /api/v2.1/public/webhooks/
      operations:
      - name: v2-1-public-webhooks-create
        method: POST
        description: Setup Webhook
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: v2-1-public-webhooks-hmac-key
      path: /api/v2.1/public/webhooks/hmac_key/
      operations:
      - name: v2-1-public-webhooks-hmac-key-get
        method: GET
        description: Get Webhook secret
        outputRawFormat: json
    - name: v2-1-public-webhooks-webhook-id
      path: /api/v2.1/public/webhooks/{webhook_id}
      operations:
      - name: v2-1-public-webhooks-destroy
        method: DELETE
        description: Remove Webhook
        outputRawFormat: json
        inputParameters:
        - name: webhook_id
          in: path
          type: integer
          required: true

naftiko: 1.0.0-alpha2
info:
  label: SpotDraft Public API — Native Integrations
  description: SpotDraft Native Integrations capability. 1 operations across versions v1/v2/v2.1.
  tags:
  - SpotDraft
  - CLM
  - Contracts
  - Native Integrations
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SPOTDRAFT_CLIENT_ID: SPOTDRAFT_CLIENT_ID
    SPOTDRAFT_CLIENT_SECRET: SPOTDRAFT_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: native-integrations
    baseUri: https://api.us.spotdraft.com
    description: SpotDraft Native Integrations endpoints.
    headers: {}
    resources:
    - name: v1-public-native-integration-solution-integration-solution-e
      path: /api/v1/public/native_integration/solution/{integration_solution_entity_id}/{credential_public_id}/
      operations:
      - name: v1-public-native-integration-solution-create
        method: POST
        description: Queue native integration contracts
        outputRawFormat: json
        inputParameters:
        - name: credential_public_id
          in: path
          type: string
          required: true
        - name: integration_solution_entity_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true

naftiko: 1.0.0-alpha2
info:
  label: SpotDraft Public API — Sidebar
  description: SpotDraft Sidebar capability. 2 operations across versions v1/v2/v2.1.
  tags:
  - SpotDraft
  - CLM
  - Contracts
  - Sidebar
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SPOTDRAFT_CLIENT_ID: SPOTDRAFT_CLIENT_ID
    SPOTDRAFT_CLIENT_SECRET: SPOTDRAFT_CLIENT_SECRET
capability:
  consumes:
  - type: http
    namespace: sidebar
    baseUri: https://api.us.spotdraft.com
    description: SpotDraft Sidebar endpoints.
    headers: {}
    resources:
    - name: v2-1-public-sidebar-files
      path: /api/v2.1/public/sidebar/files/
      operations:
      - name: v2-1-public-sidebar-files-create
        method: POST
        description: Upload sidebar file
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: v2-1-public-sidebar-query
      path: /api/v2.1/public/sidebar/query/
      operations:
      - name: v2-1-public-sidebar-query-create
        method: POST
        description: Run sidebar query
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
